<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Elite Mobile Detailing</title>

<style>
body { margin:0; font-family: Arial, sans-serif; }

header {
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px 20px;
  background:#111;
  color:white;
  position:sticky;
  top:0;
}

.btn {
  background:#007BFF;
  color:white;
  padding:12px 18px;
  border-radius:5px;
  border:none;
  cursor:pointer;
}

.hero {
  background:url('https://images.unsplash.com/photo-1503376780353-7e6692767b70') center/cover no-repeat;
  color:white;
  text-align:center;
  padding:120px 20px;
}

section {
  max-width:900px;
  margin:auto;
  padding:50px 20px;
}

input, select, textarea {
  width:100%;
  padding:12px;
  margin:10px 0;
}

.address-box {
  background:#f4f4f4;
  padding:20px;
  border-radius:8px;
}

footer {
  background:#111;
  color:white;
  text-align:center;
  padding:20px;
}
</style>

<!-- Google Places -->
<script async defer src="https://maps.googleapis.com/maps/api/js?key=AIzaSyARZAA619g3JlruK77Lfm8vlopcR76vRGg&libraries=places"></script>

</head>

<body>

<header>
  <h2>Elite Mobile Detailing</h2>
  <a class="btn" href="#booking">Check Availability</a>
</header>

<section class="hero">
  <h1>Reliable is the New Standard</h1>
  <p>Premium Mobile Detailing at Your Doorstep</p>
</section>

<section id="booking">
  <h2>Check Availability</h2>

  <div class="address-box">
    <label><strong>Enter Your Service Address</strong></label>
    <input id="address" type="text" placeholder="Start typing your address...">
    <button class="btn" onclick="scrollToBooking()">Continue to Booking</button>
  </div>

  <br>

  <!-- Calendly -->
  <div class="calendly-inline-widget"
       data-url="https://calendly.com/aarmstrong1234"
       style="min-width:320px;height:700px;">
  </div>
</section>

<script src="https://assets.calendly.com/assets/external/widget.js"></script>

<!-- FORM -->
<section>
  <h2>Request a Quote</h2>

  <form id="leadForm">

    <input type="text" id="name" placeholder="Full Name" required>
    <input type="email" id="email" placeholder="Email" required>
    <input type="tel" id="phone" placeholder="Phone Number" required>

    <!-- Hidden address field (FIX) -->
    <input type="hidden" id="addressField">

    <select id="service" required>
      <option value="">Select Service</option>
      <option>Basic Wash</option>
      <option>Interior Detail</option>
      <option>Full Detail</option>
    </select>

    <textarea id="notes" placeholder="Vehicle details"></textarea>

    <button class="btn" type="submit">Submit & Book</button>

  </form>

</section>

<footer>
  <p>Phone: 615-348-7683</p>
  <p>Email: Contact@jubileeexecutivecarservice.com</p>
</footer>

<script>
// AUTOCOMPLETE FIX (KEY PART)
function initAutocomplete() {
  if (!window.google || !google.maps) return;

  const input = document.getElementById("address");
  const autocomplete = new google.maps.places.Autocomplete(input);

  autocomplete.addListener("place_changed", function () {
    const place = autocomplete.getPlace();
    const address = place.formatted_address || "";

    // Fill visible field
    input.value = address;

    // Fill hidden field (THIS FIXES YOUR ISSUE)
    document.getElementById("addressField").value = address;

    // Backup storage
    localStorage.setItem("customer_address", address);

    console.log("Address captured:", address);
  });
}

window.addEventListener("load", () => {
  setTimeout(initAutocomplete, 500);
});

// Scroll to Calendly
function scrollToBooking() {
  const address = document.getElementById("address").value.trim();

  if (!address) {
    alert("Please enter your address first.");
    return;
  }

  document.querySelector(".calendly-inline-widget").scrollIntoView({
    behavior: "smooth"
  });
}

// FORM SUBMISSION → GOOGLE SHEETS
document.getElementById("leadForm").addEventListener("submit", function(e) {
  e.preventDefault();

  const address =
    document.getElementById("addressField").value ||
    document.getElementById("address").value ||
    localStorage.getItem("customer_address");

  const formData = new FormData();

  // 🔴 REPLACE THESE entry IDs WITH YOUR GOOGLE FORM IDs
  formData.append("entry.1732750417", document.getElementById("name").value);
  formData.append("entry.789337414", document.getElementById("email").value);
  formData.append("entry.1845647830", document.getElementById("phone").value);
  formData.append("addressField", address);
  formData.append("entry.1320034990o", document.getElementById("service").value);
  formData.append("entry.68684399_sentinel", document.getElementById("notes").value);

  fetch("https://docs.google.com/forms/d/e/1OUeiO_IystoCyNgGW4lSJmVASbh1D6-PEEo81GkoH2o/formResponse", {
    method: "POST",
    mode: "no-cors",
    body: formData
  });

  // Redirect to booking
  setTimeout(() => {
    window.location.href = "https://calendly.com/aarmstrong1234";
  }, 1000);
});
</script>

</body>
</html>
